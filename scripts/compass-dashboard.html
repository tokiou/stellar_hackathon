<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compass — Live Guard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    rel="stylesheet"
  />

  <style>
    :root {
      --bg: #fafafa;
      --text: #151a21;
      --muted: #5f6670;
      --line: #d9dce0;
      --line-soft: #e9eaec;

      --green: #2f9e44;
      --red: #e03131;
      --amber: #d98c00;
      --blue: #2f80ed;

      --serif: "Fraunces", Georgia, "Times New Roman", serif;
      --sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      --mono: "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .layout {
      display: grid;
      grid-template-columns: 132px 1fr;
      min-height: 100vh;
    }

    .sidebar {
      border-right: 1px solid var(--line);
      background: #fbfbfb;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .side-item {
      position: relative;
      color: var(--blue);
      font-size: 15px;
      font-weight: 500;
    }

    .side-item::before {
      content: "";
      position: absolute;
      left: -29px;
      top: 50%;
      width: 3px;
      height: 23px;
      transform: translateY(-50%);
      background: var(--blue);
      border-radius: 3px;
    }

    main { padding: 36px 48px 28px; }

    .header {
      padding-bottom: 22px;
      border-bottom: 1px solid var(--line);
    }

    .brand-row {
      display: flex;
      align-items: baseline;
      gap: 24px;
      margin-bottom: 22px;
    }

    .brand {
      margin: 0;
      font-family: var(--serif);
      font-size: 36px;
      font-weight: 500;
      letter-spacing: -0.02em;
    }

    .guard {
      font-family: var(--serif);
      font-style: italic;
      color: #5f6670;
      font-size: 21px;
    }

    .sub-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
    }

    .left-status { display: flex; align-items: center; gap: 22px; }

    .title {
      font-family: var(--serif);
      font-size: 25px;
      font-weight: 500;
    }

    .online { color: var(--text); }

    .online::before {
      content: "";
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 8px;
      vertical-align: middle;
    }

    .online.off::before { background: var(--red); }

    .time-small { color: var(--muted); font-variant-numeric: tabular-nums; }

    .right-actions { display: flex; align-items: center; gap: 16px; }

    select, button, input { font: inherit; }

    .period, .icon-btn {
      height: 44px;
      border: 1px solid #d4d7dc;
      border-radius: 5px;
      background: #fbfbfb;
      color: #20252b;
    }

    .period { min-width: 174px; padding: 0 16px; }

    .icon-btn { width: 48px; cursor: pointer; display: grid; place-items: center; font-size: 19px; }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      padding: 44px 0 54px;
      border-bottom: 1px solid var(--line);
    }

    .stat {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      min-height: 58px;
      border-right: 1px solid #cfd2d6;
    }

    .stat:last-child { border-right: none; }

    .stat-number {
      font-family: var(--serif);
      font-size: 36px;
      line-height: 1;
      font-weight: 500;
      font-variant-numeric: tabular-nums;
    }

    .stat-label { font-size: 16px; color: #141920; }

    .green { color: var(--green); }
    .red { color: var(--red); }
    .amber { color: var(--amber); }

    .table-section { margin-top: 28px; }

    table { width: 100%; border-collapse: collapse; table-layout: fixed; }

    thead { border-bottom: 1px solid var(--line-soft); }

    th {
      text-align: left;
      padding: 18px 12px 16px;
      color: #2b3139;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-weight: 700;
    }

    td {
      padding: 24px 12px;
      border-bottom: 1px solid var(--line-soft);
      vertical-align: middle;
    }

    th:nth-child(1), td:nth-child(1) { width: 118px; }
    th:nth-child(2), td:nth-child(2) { width: 170px; }
    th:nth-child(3), td:nth-child(3) { width: 210px; }
    th:nth-child(4), td:nth-child(4) { width: 205px; }
    th:nth-child(6), td:nth-child(6) { width: 70px; }

    .time-cell {
      position: relative;
      padding-left: 44px;
      font-variant-numeric: tabular-nums;
    }

    .time-cell::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 50%;
      width: 13px;
      height: 13px;
      border-radius: 50%;
      transform: translateY(-50%);
      background: var(--dot, var(--muted));
      z-index: 2;
    }

    .time-cell::after {
      content: "";
      position: absolute;
      left: 16px;
      top: -1px;
      bottom: -1px;
      width: 1px;
      background: #d3d6da;
      z-index: 1;
    }

    tbody tr:first-child .time-cell::after { top: 50%; }
    tbody tr:last-child .time-cell::after { bottom: 50%; }

    .badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 96px;
      padding: 7px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .badge.allow { color: #167236; background: #eef8f0; border: 1px solid #b8dfc2; }
    .badge.deny { color: #ce2525; background: #fff3f3; border: 1px solid #efb9b9; }
    .badge.escalate { color: #9a6200; background: #fff8ec; border: 1px solid #f0d9a8; }

    .mono { font-family: var(--mono); }

    .signer { display: flex; align-items: center; gap: 10px; white-space: nowrap; }

    .lock { font-size: 16px; }

    .hash {
      background: #eef0f2;
      border: 1px solid #e0e2e5;
      border-radius: 4px;
      padding: 6px 10px;
      color: #3b424b;
      font-size: 13px;
    }

    .reason { line-height: 1.45; color: #181d24; }
    .reason small { color: #4f5660; }

    .detail { text-align: right; font-size: 25px; color: #121820; padding-right: 18px; }

    .filter-icon { text-align: right; }

    .filter-box {
      display: inline-grid;
      place-items: center;
      width: 34px;
      height: 34px;
      background: #f0f1f3;
      border-radius: 2px;
      color: #252b33;
    }

    .empty { color: var(--muted); padding: 40px 12px; }

    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 22px;
      color: #4f5660;
    }

    .pagination { display: flex; align-items: center; gap: 14px; }

    .page-btn, .page-current {
      width: 44px;
      height: 38px;
      border: 1px solid #d4d7dc;
      border-radius: 4px;
      background: #fbfbfb;
      display: grid;
      place-items: center;
      color: #20252b;
    }

    .page-current { border-color: #7aa7ff; color: #1e6cff; background: #fff; }

    @media (max-width: 1100px) {
      .layout { grid-template-columns: 0 1fr; }
      .sidebar { display: none; }
      main { padding: 28px 22px; }
      .sub-row { align-items: flex-start; flex-direction: column; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .stat:nth-child(2) { border-right: none; }
      .table-section { overflow-x: auto; }
      table { min-width: 1180px; }
    }
  </style>
</head>

<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="side-item">Decisiones</div>
    </aside>

    <main>
      <header class="header">
        <div class="brand-row">
          <h1 class="brand">Compass</h1>
          <div class="guard">Live Guard</div>
        </div>

        <div class="sub-row">
          <div class="left-status">
            <div class="title">Decisiones interceptadas</div>
            <div class="online off" id="online">Conectando…</div>
            <div class="time-small" id="clock">--:--:--</div>
          </div>

          <div class="right-actions">
            <select class="period">
              <option>En vivo</option>
            </select>
            <button class="icon-btn" aria-label="Limpiar" id="clear">↻</button>
          </div>
        </div>
      </header>

      <section class="stats">
        <div class="stat">
          <div class="stat-number green" id="c-allow">0</div>
          <div class="stat-label">Permitidas</div>
        </div>
        <div class="stat">
          <div class="stat-number red" id="c-deny">0</div>
          <div class="stat-label">Denegadas</div>
        </div>
        <div class="stat">
          <div class="stat-number amber" id="c-esc">0</div>
          <div class="stat-label">Escaladas</div>
        </div>
        <div class="stat">
          <div class="stat-number" id="c-total">0</div>
          <div class="stat-label">Total</div>
        </div>
      </section>

      <section class="table-section">
        <table>
          <thead>
            <tr>
              <th>Hora</th>
              <th>Decisión</th>
              <th>Herramienta</th>
              <th>Firmante</th>
              <th>Razón</th>
              <th class="filter-icon">
                <span class="filter-box">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                    <path d="M4 7h16M7 12h10M10 17h4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
                  </svg>
                </span>
              </th>
            </tr>
          </thead>
          <tbody id="rows">
            <tr id="empty-row"><td colspan="6" class="empty">Esperando decisiones del proxy… usá el MCP para verlas aparecer.</td></tr>
          </tbody>
        </table>
      </section>

      <footer class="footer">
        <div id="footer-count">Mostrando 0 decisiones</div>
        <div class="pagination">
          <button class="page-btn">‹</button>
          <div class="page-current">1</div>
          <button class="page-btn">›</button>
        </div>
      </footer>
    </main>
  </div>

  <script>
    const rows = document.getElementById("rows");
    const emptyRow = document.getElementById("empty-row");
    const online = document.getElementById("online");
    const counts = { allow: 0, deny: 0, require_approval: 0 };

    const esc = (s) =>
      String(s ?? "").replace(/[&<>]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[c]));
    const fmtTime = (iso) => {
      try { return new Date(iso).toLocaleTimeString("es-AR", { hour12: false }); }
      catch { return "--:--:--"; }
    };
    const label = (o) => (o === "allow" ? "Permitida" : o === "deny" ? "Denegada" : "Escalada");
    const badgeClass = (o) => (o === "allow" ? "allow" : o === "deny" ? "deny" : "escalate");
    const dotVar = (o) => (o === "allow" ? "var(--green)" : o === "deny" ? "var(--red)" : "var(--amber)");

    function render(ev) {
      if (emptyRow) emptyRow.remove();
      counts[ev.outcome] = (counts[ev.outcome] || 0) + 1;
      document.getElementById("c-allow").textContent = counts.allow;
      document.getElementById("c-deny").textContent = counts.deny;
      document.getElementById("c-esc").textContent = counts.require_approval;
      const total = counts.allow + counts.deny + counts.require_approval;
      document.getElementById("c-total").textContent = total;
      document.getElementById("footer-count").textContent =
        "Mostrando " + total + " decisi" + (total === 1 ? "ón" : "ones");

      const signer =
        ev.signer === "privy"
          ? '<div class="signer"><span class="lock">🔐</span><span>Privy</span>' +
            (ev.txHash ? '<span class="hash mono">' + esc(ev.txHash.slice(0, 8)) + "</span>" : "") +
            "</div>"
          : "—";

      const tr = document.createElement("tr");
      tr.innerHTML =
        '<td class="time-cell" style="--dot:' + dotVar(ev.outcome) + '">' + fmtTime(ev.ts) + "</td>" +
        '<td><span class="badge ' + badgeClass(ev.outcome) + '">' + label(ev.outcome) + "</span></td>" +
        '<td class="mono">' + esc(ev.tool) + "</td>" +
        "<td>" + signer + "</td>" +
        '<td class="reason">' + esc(ev.reason) + "</td>" +
        '<td class="detail">›</td>';
      rows.prepend(tr);
    }

    const es = new EventSource("/events");
    es.onopen = () => { online.textContent = "Proxy online"; online.classList.remove("off"); };
    es.onerror = () => { online.textContent = "Proxy desconectado"; online.classList.add("off"); };
    es.onmessage = (e) => { try { render(JSON.parse(e.data)); } catch {} };

    setInterval(() => {
      document.getElementById("clock").textContent = new Date().toLocaleTimeString("es-AR", { hour12: false });
    }, 1000);
  </script>
</body>
</html>
