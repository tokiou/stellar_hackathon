# OpenSpec / SDD project configuration for Compass.
# Created non-destructively during SDD init; update when repo workflow or stack changes.
project:
  name: Compass
  repository: compass
  description: Solana guardrails app for safer wallet transfers, swaps, and conditional/recurrent operations.
  primary_domain: Solana wallet safety and transaction guardrails
  architecture:
    shape: Next.js fullstack app deployed as one Vercel application
    frontend: front/src plus app/page.tsx entry through Next.js
    backend: app/api route handlers backed by back/services
    shared: shared for cross-boundary types/utilities
  guardrail_principle: Critical operations must pass backend guardrails before signing/execution; failed validations must return a clear reason and suggested action.
  source_of_truth_docs:
    project_instructions: AGENTS.md
    workflow: docs/development-workflow.md
    docs_index: docs/README.md
    api_reference: docs/api-reference.md

sdd:
  execution_mode_default: auto
  artifact_stores:
    primary: openspec
    secondary: engram
    engram_project: solana_hackathon
  pr_strategy:
    default: single_pr
    review_budget: no_fixed_limit
  strict_tdd:
    enabled: true
    red_before_green: true
    tests_first_for_code_changes: true
    implementation_without_relevant_test_delta: disallowed
    no_code_in_init_or_planning_phases: true
  feature_docs:
    root: docs
    folder_pattern: docs/<feature-kebab-case>/
    canonical_files:
      - functional-spec.md
      - technical-spec.md
      - task.json
    root_docs_usage: transversal docs, indexes, or historical artifacts only
    target_feature_folder: docs/ai-sdk-agent-migration/
    existing_target_artifacts:
      - docs/ai-sdk-agent-migration/proposal.md
  phase_rules:
    init:
      allowed_actions:
        - inspect repository stack, conventions, and existing docs
        - create or update missing OpenSpec/SDD initialization artifacts
        - record important discoveries in Engram when available
      forbidden_actions:
        - implement product code
        - alter feature behavior
        - overwrite existing feature specs destructively
    proposal:
      must_reuse_existing_feature_folder: true
      must_review_existing_proposal_first: true
      output_location: docs/<feature-kebab-case>/proposal.md
      target_feature_existing_proposal: docs/ai-sdk-agent-migration/proposal.md
    spec:
      output_locations:
        functional: docs/<feature-kebab-case>/functional-spec.md
        technical: docs/<feature-kebab-case>/technical-spec.md
      require_guardrail_boundary: true
      require_api_contract_notes_when_app_api_changes: true
    tasks:
      output_location: docs/<feature-kebab-case>/task.json
      require_test_tasks_before_implementation_tasks: true
      require_reviewable_slices: true
    implementation:
      require_strict_tdd: true
      require_guardrails_before_critical_execution: true
      keep_frontend_to_backend_boundary: front -> /api/* -> app/api -> back/services
    verification:
      require_relevant_tests: true
      require_lint_for_runtime_changes: true
      require_build_for_routes_configs_or_global_imports: true

stack:
  language: TypeScript
  module_type: ESM
  package_manager: npm
  framework: Next.js 15
  runtime_targets:
    frontend: React 19 with Next.js, Tailwind CSS
    backend: Next.js API routes and Node-oriented services
  key_integrations:
    - Solana web3 / kit / SPL token
    - Dynamic wallet auth
    - Azure/OpenAI/LangChain/LangGraph currently present
    - Supabase
    - Jupiter, Birdeye, Helius service integrations

testing:
  runner: Vitest
  commands:
    frontend_unit:
      command: npm test
      equivalent: npm run test:front
      config: vitest.config.ts
      environment: jsdom
      include:
        - front/src/**/*.{test,spec}.?(c|m)[jt]s?(x)
    backend_unit:
      command: npm run test:back
      config: vitest.back.config.ts
      environment: node
      include:
        - back/services/**/*.{test,spec}.?(c|m)[jt]s?(x)
        - app/api/**/*.{test,spec}.?(c|m)[jt]s?(x)
    watch:
      command: npm run test:watch
    lint:
      command: npm run lint
      scope: app, front/src, back/services
    production_build:
      command: npm run build
    typecheck:
      command: npx tsc --noEmit
      note: no package.json script; tsconfig currently has strict=false, but SDD should still avoid ambiguous types/any
  selection_rules:
    ui_changes:
      - npm test
    backend_or_api_changes:
      - npm run test:back
    fullstack_behavior_changes:
      - npm test
      - npm run test:back
    route_config_or_global_import_changes:
      - npm run build
    runtime_code_changes:
      - npm run lint

conventions:
  aliases:
    "@/*": front/src/*
    "@front/*": front/src/*
    "@back/*": back/*
    "@shared/*": shared/*
  browser_boundary_rules:
    - Do not import back/* from browser-side components/hooks.
    - Shared contracts should live in front/src/types or shared/ as appropriate.
  api_docs_rule: Update docs/api-reference.md when app/api/* contracts change.
